<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Create Account</title>
</head>

<body>

<h1>Create Account</h1>

<form th:action="@{/register}"
      th:object="${user}"
      method="post">

    <p>Username</p>
    <input type="text" th:field="*{username}">

    <br><br>

    <p>Password</p>
    <input type="password" th:field="*{password}">

    <br><br>

    <button type="submit">
        Create Account
    </button>

</form>

<br>

<a th:href="@{/}">
Back to Login
</a>

</body>
</html>
