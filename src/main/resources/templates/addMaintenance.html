<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Maintenance</title>
</head>


<body>


<h1>Add Maintenance</h1>


<form th:action="@{/maintenance/save}"
      th:object="${maintenance}"
      method="post">


    <label>Vehicle:</label>

    <select th:field="*{vin}">

        <option value="">
            -- Select Vehicle --
        </option>


        <option th:each="vehicle : ${vehicles}"
                th:value="${vehicle.vin}"
                th:text="${vehicle.vin + ' - ' 
                + vehicle.year + ' ' 
                + vehicle.make + ' ' 
                + vehicle.model}">
        </option>


    </select>


    <br><br>


    <label>Service Type:</label>

    <input type="text"
           th:field="*{serviceType}">


    <br><br>


    <label>Date:</label>

    <input type="text"
           th:field="*{serviceDate}">


    <br><br>


    <label>Mileage:</label>

    <input type="number"
           th:field="*{mileage}">


    <br><br>


    <label>Cost:</label>

    <input type="number"
           step="0.01"
           th:field="*{cost}">


    <br><br>


    <label>Notes:</label>

    <textarea th:field="*{notes}"></textarea>


    <br><br>


    <button type="submit">
        Save Maintenance
    </button>


</form>

<a href = "/Vehicles"> Return home</a>
</body>
</html>
